{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-md-2">
        <div class="card">
            <div class="card-body p-3 admin-sidebar">
                <h6 class="text-muted text-uppercase small fw-bold mb-3">Admin Panel</h6>
                <nav class="nav flex-column gap-1">
                    <a class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}"
                       href="{{ url_for('admin.dashboard') }}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a class="nav-link {% if 'user' in request.endpoint %}active{% endif %}"
                       href="{{ url_for('admin.users_list') }}">
                        <i class="bi bi-people"></i> Users
                    </a>
                    <a class="nav-link {% if 'borrowing' in request.endpoint %}active{% endif %}"
                       href="{{ url_for('admin.borrowings_list') }}">
                        <i class="bi bi-bookmark-check"></i> Borrowings
                    </a>
                    <a class="nav-link {% if 'genre' in request.endpoint %}active{% endif %}"
                       href="{{ url_for('admin.genres_list') }}">
                        <i class="bi bi-tags"></i> Genres
                    </a>
                    <hr>
                    <a class="nav-link" href="{{ url_for('books.index') }}">
                        <i class="bi bi-collection"></i> Book Catalog
                    </a>
                </nav>
            </div>
        </div>
    </div>
    <div class="col-md-10">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
