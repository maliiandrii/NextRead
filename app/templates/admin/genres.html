{% extends 'admin/base.html' %}
{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags"></i> Genres</h2>
    <a href="{{ url_for('admin.create_genre') }}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Add Genre
    </a>
</div>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Description</th><th>Books</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for genre in genres %}
                <tr>
                    <td>{{ genre.id }}</td>
                    <td><strong>{{ genre.name }}</strong></td>
                    <td class="text-muted">{{ genre.description or '—' }}</td>
                    <td>{{ genre.books | length }}</td>
                    <td>
                        <div class="d-flex gap-1">
                            <a href="{{ url_for('admin.edit_genre', genre_id=genre.id) }}"
                               class="btn btn-sm btn-outline-warning">Edit</a>
                            <form method="POST" action="{{ url_for('admin.delete_genre', genre_id=genre.id) }}"
                                  onsubmit="return confirm('Delete genre?')">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="text-center text-muted py-4">No genres yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
